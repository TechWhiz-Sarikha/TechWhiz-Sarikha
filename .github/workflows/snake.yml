name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:       # Manual trigger from Actions tab
  push:
    branches:
      - main               # Also regenerates on every push to main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10    # Prevent hung jobs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4   # v4 is latest & faster

      - name: Generate Snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: TechWhiz-Sarikha
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-light.svg?palette=github-light
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Avoids rate limiting on large profiles

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v4      # v4 is latest
        with:
          target_branch: output
          build_dir: dist
          jekyll: false        # Faster deploy — no Jekyll processing needed
          commit_message: "chore: regenerate snake animation 🐍"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
